<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Compra en tu barrio</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

<h1>Compra en Calzada</h1>
<p>Todo lo que necesitás, a pasos de tu casa</p>

<div id="stats"></div>
<div id="rubros"></div>

<script src="data/config.js"></script>
<script src="js/app.js"></script>

<script>
(async () => {
  const data = await getComercios();

  document.getElementById("stats").innerHTML = `
    <b>${data.length}</b> comercios
  `;

  const rubros = [...new Set(data.map(c => c.rubro))];

  const container = document.getElementById("rubros");

  rubros.forEach(rubro => {
    const count = data.filter(c => c.rubro === rubro).length;

    const div = document.createElement("div");
    div.innerHTML = `
      <a href="rubro.html?rubro=${rubro}">
        <h3>${rubro}</h3>
        <p>${count} comercios</p>
      </a>
    `;

    container.appendChild(div);
  });
})();
</script>

</body>
</html>
