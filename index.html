<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Compra en tu barrio</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="css/style.css">
</head>

<body>

<header>
  <div class="title">Compra en Calzada</div>
  <input id="search" class="search" type="text" placeholder="Buscar comercios...">
</header>

<div class="container">

  <!-- HERO CON IMAGEN REAL -->
  <div class="hero">
    <img src="img/calzada.jpg" class="hero-img">
    <div class="hero-overlay">
      <h1>Todo lo que necesitás<br>en Rafael Calzada</h1>
      <p>Descubrí comercios locales cerca tuyo</p>
    </div>
  </div>

  <!-- STATS -->
  <div class="stats">
    <div class="stat" id="totalRubros">0 <span>rubros</span></div>
    <div class="stat" id="totalComercios">0 <span>comercios</span></div>
  </div>

  <!-- GRID -->
  <div id="rubros" class="grid"></div>

</div>

<script src="data/config.js"></script>
<script src="js/app.js"></script>

<script>
let comerciosGlobal = [];

(async () => {
  const data = await getComercios();
  comerciosGlobal = data;

  const rubros = [...new Set(data.map(c => c.rubro))];

  document.getElementById("totalRubros").innerHTML =
    `${rubros.length} <span>rubros</span>`;

  document.getElementById("totalComercios").innerHTML =
    `${data.length} <span>comercios</span>`;

  renderRubros(rubros, data);
})();

function renderRubros(rubros, data) {
  const container = document.getElementById("rubros");
  container.innerHTML = "";

  rubros.forEach(rubro => {
    const count = data.filter(c => c.rubro === rubro).length;

    const div = document.createElement("a");
    div.href = `rubro.html?rubro=${rubro}`;
    div.className = "card";

    div.innerHTML = `
      <div class="card-image">
        <img src="img/${rubro}.jpg" onerror="this.src='img/default.jpg'">
      </div>

      <div class="card-content">
        <h3>${rubro}</h3>
        <p>${count} comercios</p>
      </div>
    `;

    container.appendChild(div);
  });
}

// búsqueda
document.getElementById("search").addEventListener("input", e => {
  const value = e.target.value.toLowerCase();

  const filtrados = comerciosGlobal.filter(c =>
    c.nombre.toLowerCase().includes(value)
  );

  const rubros = [...new Set(filtrados.map(c => c.rubro))];
  renderRubros(rubros, filtrados);
});
</script>

</body>
</html>
