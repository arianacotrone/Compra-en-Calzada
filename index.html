<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Compra en tu barrio</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link rel="stylesheet" href="css/style.css">
</head>

<body>

<header class="header">
  <div class="header-top">
    <div class="logo">🛍️ Compra en Calzada</div>

    <input id="search" class="search" type="text" placeholder="Buscar comercios, rubros...">

    <div class="location">📍 Rafael Calzada</div>
  </div>
</header>

<div class="container">

  <section class="hero">
    <div class="hero-text">
      <h1>Comprá local, viví mejor</h1>
      <p>Descubrí comercios de Rafael Calzada y alrededores</p>
    </div>
  </section>

  <section class="stats">
    <div class="stat" id="totalRubros">0 <span>rubros</span></div>
    <div class="stat" id="totalComercios">0 <span>comercios</span></div>
  </section>

  <section>
    <h2 class="section-title">Categorías</h2>
    <div id="rubros" class="grid"></div>
  </section>

</div>

<script src="data/config.js"></script>
<script src="js/app.js"></script>

<script>
let comerciosGlobal = [];

(async () => {
  const data = await getComercios();
  comerciosGlobal = data;

  const rubros = [...new Set(data.map(c => c.rubro))];

  document.getElementById("totalRubros").innerHTML =
    `${rubros.length} <span>rubros</span>`;

  document.getElementById("totalComercios").innerHTML =
    `${data.length} <span>comercios</span>`;

  renderRubros(rubros, data);
})();

function renderRubros(rubros, data) {
  const container = document.getElementById("rubros");
  container.innerHTML = "";

  rubros.forEach(rubro => {
    const count = data.filter(c => c.rubro === rubro).length;

    const div = document.createElement("a");
    div.href = `rubro.html?rubro=${rubro}`;
    div.className = "card";

    div.innerHTML = `
      <div class="card-content">
        <div class="card-icon">${getEmoji(rubro)}</div>
        <h3>${rubro}</h3>
        <p>${count} comercios</p>
      </div>
    `;

    container.appendChild(div);
  });
}

function getEmoji(rubro) {
  const map = {
    Gastronomia: "🍽",
    Indumentaria: "👕",
    Hogar: "🏠",
    Servicios: "✂️",
    Industria: "🔧",
    Otros: "📦"
  };
  return map[rubro] || "🏪";
}

document.getElementById("search").addEventListener("input", e => {
  const value = e.target.value.toLowerCase();

  const filtrados = comerciosGlobal.filter(c =>
    c.nombre.toLowerCase().includes(value)
  );

  const rubros = [...new Set(filtrados.map(c => c.rubro))];
  renderRubros(rubros, filtrados);
});
</script>

</body>
</html>
