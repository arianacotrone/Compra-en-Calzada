<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Rubro</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="css/style.css">
</head>

<body>

<header>
  <div class="title">⭐ Compra en Calzada</div>
  <a href="index.html">⬅ Volver</a>
</header>

<div class="container">

  <h1 id="titulo"></h1>
  <p id="cantidad"></p>

  <div id="lista" class="grid"></div>

</div>

<script src="data/config.js"></script>
<script src="js/app.js"></script>

<script>
(async () => {
  const rubro = getParam("rubro");
  const data = await getComercios();

  const filtrados = data.filter(c => c.rubro === rubro);

  document.getElementById("titulo").innerText = getEmoji(rubro) + " " + rubro;
  document.getElementById("cantidad").innerText =
    filtrados.length + " comercios";

  renderComercios(filtrados);
})();

function renderComercios(lista) {
  const container = document.getElementById("lista");
  container.innerHTML = "";

  lista.forEach(c => {
    const div = document.createElement("a");
    div.href = `comercio.html?id=${c.id}`;
    div.className = "card";

    div.innerHTML = `
      <div class="card-content">
        <h3>${c.nombre}</h3>
        <p>${c.descripcion || ""}</p>
      </div>
    `;

    container.appendChild(div);
  });
}

function getEmoji(rubro) {
  const map = {
    Gastronomia: "🍽",
    Indumentaria: "👕",
    Hogar: "🏠",
    Servicios: "✂️",
    Industria: "🔧",
    Otros: "📦"
  };
  return map[rubro] || "🏪";
}
</script>

</body>
</html>
